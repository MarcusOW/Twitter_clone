version: "3.8"
services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: twitter_dev
      POSTGRES_PASSWORD: twitter_dev
      POSTGRES_DB: twitter_dev_db
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - db
volumes:
  postgres_data:
